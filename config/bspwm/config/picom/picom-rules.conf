blur:

	{
		method = "gaussian";
		size = 4;
		deviation = 2.5;
	}

rules: (

	{
		blur-background = false;
		fade = false;
	},

	{
		match = "window_type = 'normal'
                && !(class_g = 'Rofi'
                    || class_g = 'Viewnior'
                    || class_g = 'mpv')";

        @include "picom-animations.conf"
		fade = true;	#-fade-switch
		shadow = true;	#-shadow-switch
	},

	{
		match = "window_type = 'dialog'";
		fade = true;	#-fade-switch
		shadow = true;	#-shadow-switch
	},

	{
		match = "window_type = 'tooltip'";
		corner-radius = 0;
		opacity = 0.90;
	},

    {
		match = "fullscreen";
		corner-radius = 0;
	},

	{
		match = "window_type = 'dropdown_menu' || window_type = 'menu' || window_type = 'popup' || window_type = 'popup_menu'";
		corner-radius = 0;
	},

    {
        # Fix shadow related bugs on small UI elements
        match = "window_type = 'menu' || role = 'popup' || role = 'bubble'";
        shadow = false;
    },

## ----- Single apps rules ----- ##

    {
        match = "class_g = 'Dunst'";
        @include "picom-dunst-animations.conf"
        shadow = false;
        corner-radius = 0;
    },

	{
		match = "class_g = 'Alacritty'	|| class_g = 'st-256color' || class_g = 'FloaTerm' || name = 'FloaTerm'";
		opacity = 1.0;	#-term-opacity-switch
		blur-background = false;	#-blur-switch
	},

	{
		match = "class_g = 'Updating' || name = 'Updating'";
		opacity = 0.93;
		blur-background = false;	#-blur-switch
	},

    {
        match = "class_g = 'bspwm-scratch' || name = 'bspwm-scratch'";
            animations = (

                {
                    triggers = ["close", "hide"];
                    preset = "fly-out";
                    direction = "up";
                    duration = 0.3;
                },

                {
                    triggers = ["open", "show"];
                    preset = "fly-in";
                    direction = "up";
                    duration = 0.3;
                }
            )
        opacity = 0.93;
        corner-radius = 0;
        shadow = false;
		blur-background = false;	#-blur-switch
    },

    {
        match = "class_g = 'jgmenu'";
            animations = (

                {
                    triggers = ["close", "hide"];
                    preset = "disappear";
                    duration = 0.08;
                    scale = 0.5;
                },

                {
                    triggers = ["open", "show"];
                    preset = "appear";
                    duration = 0.15;
                    scale = 0.5;
                }
            )
        shadow = false;
        corner-radius = 0;
    },

	{
        match = "name = 'Eww - launchermenu'";
            animations = (

                {
                    triggers = ["close", "hide"];
                    preset = "slide-out";
                    direction = "right";
                    duration = 0.2;
                },

                {

                    triggers = ["open", "show"];
                    preset = "slide-in";
                    direction = "right";
                    duration = 0.2;
                }
            )
    },

    {
        match = "name = 'Eww - music'";
            animations = (

                {
                    triggers = ["close", "hide"];
                    preset = "slide-out";
                    direction = "down";
                    duration = 0.3;
                },

                {
                    triggers = ["open", "show"];
                    preset = "slide-in";
                    direction = "up";
                    duration = 0.3;
                }
            )
    },

    {
        match = "name = 'Eww - csheet'";
            animations = (

                {
                    triggers = ["close", "hide"];
                    preset = "disappear";
                    duration = 0.3;
                    scale = 0.5;
                },

                {
                    triggers = ["open", "show"];
                    preset = "appear";
                    duration = 0.3;
                    scale = 0.5;
                }
            )
    },

    {
        match = "name = 'Eww - bar'     || "
                "class_g = 'Polybar'    || "
                "window_type = 'dock'";
            animations = (

                {
                    triggers = ["close", "hide"];
                    preset = "disappear";
                    duration = 0.15;
                    scale = 0.5;
                },

                {
                    triggers = ["open", "show"];
                    preset = "appear";
                    duration = 0.15;
                    scale = 0.5;
                }
            )
        corner-radius = 0;
        shadow = false;
        fade = false;
    },

	{
		match = "class_g = 'Eww'";
		corner-radius = 0;
        shadow = false;
	},

	{
		match = "class_g = 'firefox'		|| "
				"class_g = 'Screenkey'		|| "
				"_GTK_FRAME_EXTENTS@";
		shadow = false;
	},

    {
		match = "class_g = 'Rofi'           || "
				"class_g = 'Viewnior'       || "
				"class_g = 'mpv'            || "
				"class_g = 'retroarch'";
		corner-radius = 0;
		fade = true;	#-fade-switch
        shadow = false;
	}
)
