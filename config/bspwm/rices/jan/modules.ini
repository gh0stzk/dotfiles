ws-icon-0 = 1;¾░¼║
ws-icon-1 = 2;¾░¼╗
ws-icon-2 = 3;¾░¼╝
ws-icon-3 = 4;¾░¼Į
ws-icon-4 = 5;¾░¼Š
ws-icon-5 = 6;¾░¼┐
ws-icon-6 = 7;¾░ŁĆ
ws-icon-7 = 8;¾░Łü
ws-icon-8 = 9;¾░Łé
ws-icon-default = "ŌÖ¤"

format = <label-state>

label-focused = [%icon%]
