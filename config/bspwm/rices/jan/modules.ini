[module/date]
type = internal/date

interval = 1.0

time = %I:%M %P
format-foreground = ${color.fg}
date-alt = "%a, %d %b %Y"

format = <label>
label = "%time%%date%"

######################################################

[module/filesystem]
type = internal/fs

mount-0 = /

interval = 60
fixed-values = false

format-mounted = <label-mounted>
format-mounted-prefix = "’Ā×"
format-mounted-prefix-padding = 3pt
format-mounted-prefix-foreground = ${color.orange}

format-unmounted = <label-unmounted>
format-unmounted-prefix = "’Ā×"
format-unmounted-prefix-padding = 3pt

label-mounted = "%used%"
label-unmounted = " %mountpoint%: not mounted"

######################################################

[module/network]
type = internal/network
interface = ${system.sys_network_interface}

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = "’®Å"
format-connected-prefix-padding = 3pt
format-connected-foreground = ${color.green}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "’®ō"
format-disconnected-prefix-padding = 3pt
format-disconnected-foreground = ${color.red}

speed-unit = ""
label-connected = "%{A1:OpenApps --netmanager:}%netspeed%%{A}"
label-connected-foreground = ${color.amber}
label-disconnected = "%{A1:OpenApps --netmanager:}Offline%{A}"
label-disconnected-foreground = ${color.red}

######################################################

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <label-volume>
format-volume-prefix = "’”┤"
format-volume-prefix-padding = 3pt
format-volume-foreground = ${color.blue}

label-volume = "%percentage%"
label-volume-foreground = ${color.fg}

format-muted = <label-muted>
format-muted-prefix = "’”Į"
format-muted-prefix-padding = 3pt
label-muted = "Muted"
label-muted-foreground = ${color.red}

click-right = OpenApps --soundcontrol

######################################################

[module/brightness]
type = internal/backlight
card = ${system.sys_graphics_card}

enable-scroll = true

format = <ramp><label>
label = %percentage%%
label-padding = 3pt

ramp-0 = ’óĪ
ramp-1 = ’óĪ
ramp-foreground = ${color.yellow}

######################################################

[module/battery]
type = internal/battery
full-at = 99
battery = ${system.sys_battery}
adapter = ${system.sys_adapter}
poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging><label-charging>
format-charging-prefix-foreground = ${color.red}
label-charging = %percentage%%

format-discharging = <ramp-capacity><label-discharging>
label-discharging = %percentage%%

format-full = <label-full>
format-full-prefix = ’øĀ
format-full-prefix-padding = 3pt
format-full-prefix-foreground = ${color.green}
label-full = %percentage%%

ramp-capacity-0 = ’ø¤
ramp-capacity-1 = ’øó
ramp-capacity-2 = ’øŻ
ramp-capacity-3 = ’øĪ
ramp-capacity-4 = ’øĀ
ramp-capacity-padding = 3pt
ramp-capacity-foreground = ${color.blue}

animation-charging-0 = ’ø¤
animation-charging-1 = ’øó
animation-charging-2 = ’øŻ
animation-charging-3 = ’øĪ
animation-charging-4 = ’øĪ
animation-charging-padding = 3pt
animation-charging-foreground = ${color.green}
animation-charging-framerate = 700

######################################################

[module/weather]
type = custom/script
exec = Weather wmodule
interval = 900
format = <label>
label = " %output% "

######################################################

[module/title]
type = internal/xwindow

format = <label>
format-prefix = "’×É "
format-prefix-foreground = ${color.lime}

label = "%title%"
label-maxlen = 45

label-empty = " Arch Linux"
